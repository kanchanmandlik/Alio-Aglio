services:

  frontend:
    build: ./frontend
    ports:
      - "86:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
     - "3000:3000"
    depends_on:
      - postgres
    
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: recipes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
     - postgres-data:/var/lib/postgresql/data
     - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql



volumes:
  postgres-data: