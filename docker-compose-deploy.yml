services:

  frontend:
    image: kmandlik/alioaglio-frontend:${IMAGE_VERSION}
    ports:
      - "85:80"
    depends_on:
      - backend

  backend:
    image: kmandlik/alioaglio-backend:${IMAGE_VERSION}
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: recipes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres-data: